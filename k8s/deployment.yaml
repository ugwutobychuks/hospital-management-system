apiVersion: apps/v1
kind: Deployment
metadata:
  name: hms-app
  labels:
    app: hms-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hms-app
  template:
    metadata:
      labels:
        app: hms-app
    spec:
      containers:
      - name: hms-app
        image: hms:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        - name: DB_HOST
          value: "hms-postgres-service"
        - name: REDIS_HOST
          value: "hms-redis-service"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: hms-app-service
spec:
  selector:
    app: hms-app
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
  type: LoadBalancer